name: CI

on:
  pull_request:
    branches:
      - main

jobs:
  test-api:
    runs-on: ubuntu-latest
    environment: test

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: asset_shop_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    # DATABASE_URL mirrors api/.env but points to the CI Postgres service container, not localhost
    # Auth service env vars mirror api/src/services/auth/.env
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/asset_shop_test
      TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/asset_shop_test
      JWT_SECRET: ${{ secrets.JWT_SECRET }}
      AWS_REGION: ${{ secrets.AWS_REGION }}
      AWS_SES_ACCESS_KEY: ${{ secrets.AWS_SES_ACCESS_KEY }}
      AWS_SES_SECRET_ACCESS_KEY: ${{ secrets.AWS_SES_SECRET_ACCESS_KEY }}
      SES_FROM_EMAIL: ${{ secrets.SES_FROM_EMAIL }}
      API_URL: ${{ secrets.API_URL }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate
        working-directory: api

      - name: Run migrations
        run: npx prisma migrate deploy
        working-directory: api

      - name: Run linter
        run: npm run lint
        working-directory: api

      - name: Build
        run: npm run build
        working-directory: api

      - name: Run tests with coverage
        run: npm run test:coverage
        working-directory: api

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./api/coverage/lcov.info
          flags: api
