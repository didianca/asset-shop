services:
  migrate:
    build:
      context: .
      dockerfile: api/Dockerfile
    command: ["sh", "-c", "cd api && npx prisma migrate deploy"]
    env_file:
      - .env
      - api/.env
      - api/src/services/auth/.env
      - api/src/services/cart/.env
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  api:
    build:
      context: .
      dockerfile: api/Dockerfile
      target: dev
    ports:
      - "3000:3000"
      - "9229:9229"
    volumes:
      - ./api/src:/app/api/src
    env_file:
      - .env
      - api/.env
      - api/src/services/auth/.env
      - api/src/services/cart/.env
    environment:
      NODE_ENV: development
      PORT: 3000
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  client:
    build:
      context: .
      dockerfile: client/Dockerfile
    ports:
      - "5173:5173"
    environment:
      API_URL: http://api:3000
    depends_on:
      - api

  postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
